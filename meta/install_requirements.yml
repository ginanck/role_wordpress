---

roles:
  - src: https://github.com/ginanck/role_base.git
    name: role_base
    version: master
  - src: https://github.com/ginanck/role_nginx.git
    name: role_nginx
    version: master
  - src: https://github.com/ginanck/role_mariadb.git
    name: role_mariadb
    version: master

collections:
  # Required for molecule to spin up containers
  - name: community.docker
    version: 4.8.1

  # https://galaxy.ansible.com/ui/repo/published/community/general/docs/
  - name: community.general
    version: 6.6.1

  # https://galaxy.ansible.com/ui/repo/published/ansible/posix/docs/
  # Required by molecule docker driver (ansible.posix.synchronize)
  - name: ansible.posix
    version: 1.5.4

  # https://galaxy.ansible.com/ui/repo/published/community/mysql/docs/
  # Required by role_mariadb in prepare phase
  - name: community.mysql
    version: 3.12.0
