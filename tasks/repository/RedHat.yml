---
- name: Install EPEL Repository
  ansible.builtin.dnf:
    name: epel-release
    state: present

- name: Install Remi Repository
  ansible.builtin.dnf:
    name: "https://rpms.remirepo.net/enterprise/remi-release-{{ ansible_facts['distribution_major_version'] }}.rpm"
    state: present
    disable_gpg_check: true

- name: Enable Remi PHP Module
  ansible.builtin.command:
    cmd: "dnf module reset php -y && dnf module enable php:remi-{{ wordpress_php_version }} -y"
  args:
    executable: /bin/bash
  register: wordpress_remi_module
  changed_when: "'Enabling' in wordpress_remi_module.stdout"
  failed_when: wordpress_remi_module.rc != 0
