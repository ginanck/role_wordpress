---
- name: Install Repository Prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present
    update_cache: true

- name: Add Ondrej PHP PPA Repository (Ubuntu)
  ansible.builtin.apt_repository:
    repo: "ppa:ondrej/php"
    state: present
    update_cache: true
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Add Sury PHP Repository Signing Key (Debian)
  ansible.builtin.apt_key:
    url: "https://packages.sury.org/php/apt.gpg"
    state: present
  when: ansible_facts['distribution'] == 'Debian'

- name: Add Sury PHP Repository (Debian)
  ansible.builtin.apt_repository:
    repo: "deb https://packages.sury.org/php/ {{ ansible_facts['distribution_release'] }} main"
    state: present
    filename: php-sury
    update_cache: true
  when: ansible_facts['distribution'] == 'Debian'
